<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RiverForge Editor</title>
<link rel="icon" href="icon-192.png" type="image/png">
<style>
:root{
  --bg:#f1f5f9;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;
  --text:#1e293b;--muted:#64748b;--accent:#3b82f6;--accent-h:#2563eb;--accent-rgb:59,130,246;
  --danger:#ef4444;--success:#22c55e;
  --sh:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --sh-lg:0 10px 25px rgba(0,0,0,.12);
}
[data-theme=dark]{
  --bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;
  --text:#f1f5f9;--muted:#94a3b8;--accent:#60a5fa;--accent-h:#93c5fd;--accent-rgb:96,165,250;
  --danger:#f87171;--success:#4ade80;
  --sh:0 1px 3px rgba(0,0,0,.4);--sh-lg:0 10px 25px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* вФАвФА –®–∞–њ–Ї–∞ вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
   #hdr: –ї–Њ–≥–Њ—В–Є–њ + –Ї–љ–Њ–њ–Ї–Є —Б–Ї–∞—З–Є–≤–∞–љ–Є—П + —А–∞–Ј–і–µ–ї–Є—В–µ–ї–Є + toggle —В–µ–Љ—Л */
#hdr{display:flex;align-items:center;gap:10px;padding:9px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;box-shadow:var(--sh)}
#hdr-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
#hdr-logo img{width:26px;height:26px;border-radius:5px}
.spacer{flex:1}
.vd{width:1px;height:20px;background:var(--border);flex-shrink:0}

/* вФАвФА –Ъ–љ–Њ–њ–Ї–Є (.btn / .btn-p –∞–Ї—Ж–µ–љ—В / .btn-d –Њ–њ–∞—Б–љ–Њ—Б—В—М / .btn-sm / .btn-icon) вФАвФА */
.btn{padding:6px 12px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--surface2);border-color:var(--accent);color:var(--accent)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-p:hover{background:var(--accent-h);border-color:var(--accent-h);color:#fff}
.btn-d{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-d:hover{opacity:.85;color:#fff}
.btn-sm{padding:3px 9px;font-size:12px}
.btn-icon{padding:5px;border:none;background:transparent;cursor:pointer;color:var(--muted);border-radius:5px;font-size:14px;line-height:1;transition:all .1s}
.btn-icon:hover{background:var(--surface2);color:var(--danger)}

/* вФАвФА –Я–µ—А–µ–Ї–ї—О—З–∞—В–µ–ї—М —В–µ–Љ—Л (slider-knob, –Є–Ї–Њ–љ–Ї–Є –ї—Г–љ—Л/—Б–Њ–ї–љ—Ж–∞) вФАвФА */
.theme-toggle{width:54px;height:28px;border-radius:14px;background:#6c6874;position:relative;cursor:pointer;flex-shrink:0;transition:background .25s}
.t-knob{position:absolute;width:22px;height:22px;border-radius:50%;background:#38408a;top:50%;transform:translateY(-50%);left:3px;transition:left .28s ease,background .28s;box-shadow:0 2px 7px rgba(0,0,0,.55);pointer-events:none}
.t-moon,.t-sun{position:absolute;top:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:13px;pointer-events:none;user-select:none;transition:opacity .2s}
.t-moon{right:5px;left:auto;width:16px;opacity:1}
.t-sun{left:5px;width:16px;opacity:0}
.theme-toggle.on .t-knob{left:29px;background:#ffc840;box-shadow:0 2px 10px rgba(255,200,60,.5)}
.theme-toggle.on .t-moon{opacity:0}
.theme-toggle.on .t-sun{opacity:1}

/* вФАвФА –Т–Ї–ї–∞–і–Ї–Є (#tabs, .tab) вФАвФА */
#tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{padding:10px 16px;cursor:pointer;white-space:nowrap;color:var(--muted);font-size:13px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s}
.tab:hover{color:var(--text)}
.tab.on{color:var(--accent);border-color:var(--accent);font-weight:600}

/* вФАвФА –Ю—Б–љ–Њ–≤–љ–∞—П –Њ–±–ї–∞—Б—В—М (#ct) вАФ –њ—А–Њ–Ї—А—Г—В–Ї–∞, –Њ—В—Б—В—Г–њ—Л вФАвФА */
#ct{flex:1;overflow-y:auto;padding:16px}

/* вФАвФА –°–µ–Ї—Ж–Є–Є –Ї–∞—В–µ–≥–Њ—А–Є–є (.cat-sec / .cat-hdr / drag-over) вФАвФА */
.cat-sec{margin-bottom:20px}
.cat-hdr{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface);border:1px solid var(--border);border-radius:7px 7px 0 0;border-bottom:none;user-select:none}
.cat-hdr-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-hdr-name{font-weight:600;font-size:14px;flex:1}
.cat-sec-drag-over .cat-hdr{border-top:3px solid var(--accent)}

/* вФАвФА –Ґ–∞–±–ї–Є—Ж–∞ –і–∞–љ–љ—Л—Е (.tbl-data, th::after —А–∞–Ј–і–µ–ї–Є—В–µ–ї–Є, .cr —А–µ—Б–∞–є–Ј) вФАвФА */
.tbl-wrap{background:var(--surface);border-radius:0 0 8px 8px;box-shadow:var(--sh);overflow-x:auto;overflow-y:hidden;border:1px solid var(--border)}
.cat-sec .tbl-wrap{margin-top:0}
table{width:100%;border-collapse:collapse;font-size:13px}
.tbl-data{table-layout:fixed}
thead{background:var(--surface2)}
th{text-align:left;padding:9px 11px;font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);position:relative;white-space:nowrap;overflow:hidden;user-select:none}
th::after{content:'';position:absolute;right:4px;top:10%;height:80%;width:1px;background:var(--border);pointer-events:none}
.tbl-data thead th:first-child::after,#gl-tbl thead th:first-child::after{display:none}
thead th:last-child::after,thead th:nth-last-child(2)::after{display:none}
th:last-child::after{display:none}
.cr{position:absolute;right:0;top:0;bottom:0;width:4px;cursor:col-resize;background:transparent;z-index:1}
.cr:hover,.cr.act{background:var(--accent)}
td{padding:6px 11px;border-bottom:1px solid var(--border);vertical-align:middle;overflow:hidden}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s}
tbody tr:hover td{background:var(--surface2)}
tbody tr.drag-over-top td{border-top:2px solid var(--accent)}
.dh-row{color:var(--muted);font-size:15px;cursor:grab;opacity:.3;line-height:1;display:block}
tbody tr:hover .dh-row{opacity:.7}
.row-dropzone{height:22px;}
.row-dropzone:hover td,.row-dropzone td{background:transparent!important;border:none!important;}
.row-dropzone.drag-over-top td{border-top:2px solid var(--accent)!important;}
.td-hl{color:var(--muted);font-size:12px;line-height:1.4;cursor:text;white-space:normal;}
.td-hl:hover{color:var(--text)}
.td-hl:empty::before{content:'вАФ';opacity:.3}
.td-hl strong{color:var(--accent);font-weight:600}
.td-hl-ta{width:100%;background:var(--surface);border:1px solid var(--accent);border-radius:4px;color:var(--text);font-size:12px;font-family:inherit;font-weight:inherit;line-height:1.4;padding:5px 7px;resize:none;outline:none;box-sizing:border-box;display:block;}

/* вФАвФА –†–µ–і–∞–Ї—В–Є—А—Г–µ–Љ—Л–µ —П—З–µ–є–Ї–Є (.ci вАФ —З–Є—Б–ї–∞/—В–µ–Ї—Б—В, .cs вАФ select) вФАвФА */
.ci{border:none;border-bottom:1px solid transparent;background:transparent;color:inherit;font:inherit;width:100%;padding:1px 0;outline:none;transition:border-color .15s;-moz-appearance:textfield}
.ci::-webkit-inner-spin-button{display:none}
tr:hover .ci{border-bottom-color:var(--border)}
.ci:focus{border-bottom-color:var(--accent)!important}
.cs{border:none;border-bottom:1px solid transparent;background:transparent;color:inherit;font:inherit;width:100%;padding:1px 0;outline:none;cursor:pointer;transition:border-color .15s}
tr:hover .cs{border-bottom-color:var(--border)}
.cs:focus{border-bottom-color:var(--accent)!important}
.cs option,.cfg-sel option,select option{background:var(--surface2);color:var(--text)}

/* вФАвФА Pill-—Б–µ–ї–µ–Ї—В–Њ—А –Ї–ї–∞—Б—Б–Њ–≤/—А–∞—Б (.pills-bar / .pill) вФАвФА */
.pills-bar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.pill{padding:5px 13px;border-radius:20px;border:1px solid var(--border);font-size:13px;cursor:pointer;background:var(--surface);color:var(--muted);user-select:none;transition:all .15s}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* вФАвФА –Ъ–Њ–љ—Д–Є–≥-–њ–∞–љ–µ–ї–Є (.panel / .csel –Ї–∞—Б—В–Њ–Љ–љ—Л–є select / .cfg-* / .ap-*) вФАвФА */
.panel{background:var(--surface);border-radius:8px;box-shadow:var(--sh);padding:16px;margin-bottom:14px}
.panel h3{font-size:14px;font-weight:600;margin-bottom:8px;padding-bottom:4px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.panel h3:hover{color:var(--accent)}
.panel h3 .ph-arr{font-size:10px;margin-right:2px;color:var(--muted)}
.csel{position:relative;user-select:none}
.csel-trg{display:flex;align-items:center;justify-content:space-between;gap:4px;padding:3px 8px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;background:var(--surface2);color:var(--text);width:100%;box-sizing:border-box;transition:border-color .15s;white-space:nowrap;user-select:none}
.csel-trg:hover,.csel-trg.open{border-color:var(--accent)}
.csel-arr{font-size:8px;opacity:.55;transition:transform .18s;flex-shrink:0}
.csel-trg.open .csel-arr{transform:rotate(180deg)}
.csel-drop{position:fixed;z-index:9999;background:var(--surface2);border:1px solid var(--border);border-radius:14px;box-shadow:0 8px 28px rgba(0,0,0,.6);overflow:visible;min-width:130px;display:none;animation:ddIn .12s ease;padding:4px;}
.csel-opt{padding:6px 12px;font-size:12px;cursor:pointer;color:var(--text);white-space:nowrap;transition:background .1s;border-radius:8px;}
.csel-opt:hover{background:rgba(255,255,255,0.07)}
.csel-opt.csel-sel{color:var(--accent);font-weight:500}
.ap-sec{border-bottom:1px solid var(--border);margin-bottom:2px}
.ap-sec-hdr{display:flex;align-items:center;gap:6px;cursor:pointer;padding:7px 0;user-select:none}
.ap-sec-hdr:hover{color:var(--accent)}
.ap-sec.ap-over{background:rgba(var(--accent-rgb),.07);border-radius:6px}
.cfg-table{width:100%;border-collapse:collapse;font-size:13px}
.cfg-table th{text-align:left;padding:5px 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:1px solid var(--border)}
.cfg-table td{padding:4px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.cfg-inp{width:100%;border:none;border-bottom:1px solid transparent;background:transparent;color:var(--text);font-size:13px;padding:2px 0;font-family:inherit;outline:none;transition:border-color .15s}
.cfg-inp:focus{border-bottom-color:var(--accent)}
.cfg-sel{width:100%;border:none;background:transparent;color:var(--text);font-size:13px;font-family:inherit;outline:none;cursor:pointer}
.cfg-sel:focus{border-bottom:1px solid var(--accent)}
.cfg-swatch{width:28px;height:22px;border-radius:4px;border:1px solid var(--border);cursor:pointer;flex-shrink:0;transition:box-shadow .15s}
.cfg-swatch:hover{box-shadow:0 0 0 2px var(--accent)}
.cfg-dh{color:var(--muted);cursor:grab;opacity:.4;font-size:15px;padding:0 4px;flex-shrink:0}
tr:hover .cfg-dh{opacity:.9}
.cfg-drag-over td{border-top:2px solid var(--accent)!important}

/* вФАвФА –Т—Б–њ–ї—Л–≤–∞—О—Й–µ–µ –Њ–Ї–љ–Њ –≤—Л–±–Њ—А–∞ —Ж–≤–µ—В–∞ (#cpop) вФАвФА */
#cpop{display:none;position:fixed;z-index:600;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;box-shadow:var(--sh-lg);width:190px}
#cpop input[type=color]{width:100%;height:60px;padding:0;border:1px solid var(--border);border-radius:7px;cursor:pointer;display:block;margin-bottom:8px;appearance:none;-webkit-appearance:none;background:none}
.cp-hex{width:100%;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font-size:13px;text-align:center;padding:6px;font-family:monospace;outline:none;display:block}
.cp-hex:focus{border-color:var(--accent)}

/* вФАвФА –Ч–∞–≥–Њ–ї–Њ–≤–Њ–Ї –Ї–∞—В–µ–≥–Њ—А–Є–Є (–і—Г–±–ї–Є—А—Г–µ—В flex –і–ї—П collapsed-—Б–Њ—Б—В–Њ—П–љ–Є—П) вФАвФА */
.cat-hdr{cursor:pointer;display:flex;align-items:center;gap:6px;padding:7px 10px}
.cat-hdr .btn-d{margin-left:auto}
.cat-body-wrap{transition:none}
/* вФАвФА DnD –Ї–Њ–ї–Њ–љ–Њ–Ї (.col-drag-over) –Є —А–µ–і–∞–Ї—В–Є—А—Г–µ–Љ—Л–є label –Ї–∞—В–µ–≥–Њ—А–Є–Є вФАвФА */
.col-drag-over{border-left:2px solid var(--accent)!important;background:rgba(var(--accent-rgb),.06)}
.cat-lbl-inp{border:none;border-bottom:1px solid transparent;background:transparent;color:var(--text);font:600 14px/1 inherit;outline:none;padding:0;width:130px;transition:border-color .15s}
.cat-lbl-inp:hover,.cat-lbl-inp:focus{border-bottom-color:var(--accent)}
.cat-key-lbl{font-size:11px;color:var(--muted);opacity:.6;margin-left:4px}

/* вФАвФА –Ъ–ї–∞—Б—Б/—А–∞—Б–∞: –Љ–∞–Ї–µ—В —Б –∞—А—В–Њ–Љ (.cls-layout / .type-dd-* dropdown) вФАвФА */
.cls-layout{display:flex;gap:16px;align-items:stretch}
.cls-art-col{flex-shrink:0;width:220px;display:flex;flex-direction:column}
.cls-art-col img{width:100%;flex:1;border-radius:8px;object-fit:cover;display:block;background:var(--surface2);min-height:160px}
.cls-art-placeholder{width:100%;flex:1;min-height:160px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px}
.cls-fields{flex:1;min-width:0}
.collapse-all-btn{font-size:11px;padding:2px 7px;opacity:.7}
.cls-rename-inp{border:none;border-bottom:1px solid transparent;background:transparent;color:var(--text);font:600 15px/1 inherit;outline:none;padding:0;min-width:80px;width:auto;max-width:340px;transition:border-color .15s}
.cls-rename-inp:hover,.cls-rename-inp:focus{border-bottom-color:var(--accent)}
.type-dd-btn{display:flex;align-items:center;justify-content:space-between;padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:12px;gap:4px;width:100%;box-sizing:border-box;transition:border-color .15s;white-space:nowrap;user-select:none;}
.type-dd-btn:hover,.type-dd-btn.dd-open{border-color:var(--accent);}
.dd-arrow{font-size:8px;opacity:.55;transition:transform .18s;flex-shrink:0;}
.type-dd-btn.dd-open .dd-arrow{transform:rotate(180deg);}
.type-dd-panel{position:fixed;z-index:9999;background:var(--surface2);border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 24px rgba(0,0,0,.45);overflow:hidden;animation:ddIn .12s ease;}
@keyframes ddIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.type-dd-opt{padding:7px 14px;cursor:pointer;font-size:12px;transition:background .1s;white-space:nowrap;}
.type-dd-opt:hover{background:rgba(var(--accent-rgb),.13);}
.type-dd-opt.dd-sel{color:var(--accent);font-weight:500;}
.type-dd-grp{padding:5px 14px 4px;font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.4px;border-top:1px solid rgba(255,255,255,.07);user-select:none;}
.type-dd-grp:first-child{border-top:none;}
.type-dd-sub{padding-left:26px!important;}
.type-cfg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:6px;}
.type-cfg-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-weight:600;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);}
.type-cfg-row{display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.type-cfg-inp{flex:1;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text);font-size:13px;outline:none;padding:2px 4px;min-width:0;transition:border-color .15s;}
.type-cfg-inp:hover,.type-cfg-inp:focus{border-bottom-color:var(--accent);}
.dir-grp{margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.dir-grp:last-of-type{border-bottom:none;}
.dir-grp-head{display:flex;align-items:center;gap:6px;padding:3px 0;margin-bottom:2px;}
.dir-sub-row{display:flex;align-items:center;gap:4px;padding:2px 0 2px 10px;}
.circle-pill{display:inline-flex;align-items:center;gap:2px;padding:3px 8px 3px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);font-size:12px;font-weight:600;}
.circle-pill input{border:none;background:transparent;color:var(--text);font:600 12px/1 inherit;width:28px;text-align:center;outline:none;padding:0;}
.circle-pill .btn-icon{font-size:10px;padding:0;opacity:.5;line-height:1;}

/* вФАвФА –Р–Ї–Ї–Њ—А–і–µ–Њ–љ (.acc-hdr / .acc-body) –Є –њ–Њ–ї—П —Д–Њ—А–Љ—Л (.fr / .fl / .fv) вФАвФА */
.acc-hdr{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--surface2);border-radius:6px;cursor:pointer;margin-bottom:3px;user-select:none;transition:background .1s}
.acc-hdr:hover{background:var(--border)}
.acc-hdr strong{flex:1}
.acc-body{padding:12px;border:1px solid var(--border);border-radius:6px;margin-bottom:8px}
.fr{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.fl{width:105px;flex-shrink:0;padding-top:5px;color:var(--muted);font-size:12px;font-weight:500}
.fv{flex:1}
.fv input{width:100%;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;padding:3px 0;font-family:inherit;outline:none}
.fv input:focus{border-bottom-color:var(--accent)}
.art-up-btn{flex-shrink:0;padding:2px 7px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;font-size:13px;line-height:1.6;}
.art-up-btn:hover{background:var(--surface3);color:var(--text);}
.fv textarea{width:100%;border:1px solid var(--border);border-radius:4px;padding:5px 7px;background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:vertical;min-height:48px;line-height:1.5}
.fv textarea:focus{border-color:var(--accent)}
.sub-lbl{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:10px 0 4px}

<script>
/* вФАвФА –У–ї–Њ–±–∞–ї—М–љ–Њ–µ —Б–Њ—Б—В–Њ—П–љ–Є–µ вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
   S.db / S.cfg вАФ –і–∞–љ–љ—Л–µ –Ј–∞–≥—А—Г–ґ–∞—О—В—Б—П –Є–Ј /public/db.json –Є /public/config.json
   TAB вАФ –∞–Ї—В–Є–≤–љ–∞—П –≤–Ї–ї–∞–і–Ї–∞; DND_ROW вАФ —Б–Њ—Б—В–Њ—П–љ–Є–µ drag-and-drop —Б—В—А–Њ–Ї —В–∞–±–ї–Є—Ж—Л */
var S = { db: null, cfg: null };
var TAB = 'skills', CAT = null, ACC = {};
var DND_ROW = {};
var PREV_VIEW = 'groups';

/* вФАвФА HTML-—Н–Ї—А–∞–љ–Є—А–Њ–≤–∞–љ–Є–µ вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
   eA вАФ –і–ї—П –Ј–љ–∞—З–µ–љ–Є–є –∞—В—А–Є–±—Г—В–Њ–≤ (—Н–Ї—А–∞–љ–Є—А—Г–µ—В "), eH вАФ –і–ї—П —В–µ–Ї—Б—В–Њ–≤—Л—Е —Г–Ј–ї–Њ–≤ */
function eA(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function eH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hexRgb(hex){var h=hex.replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];return parseInt(h.slice(0,2),16)+','+parseInt(h.slice(2,4),16)+','+parseInt(h.slice(4,6),16);}
function blendHex(base,fg,opacity){
  function parse(h){h=h.replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  function toH(n){return(n<16?'0':'')+Math.max(0,Math.min(255,Math.round(n))).toString(16);}
  try{var b=parse(base),f=parse(fg);return'#'+toH(f[0]*opacity+b[0]*(1-opacity))+toH(f[1]*opacity+b[1]*(1-opacity))+toH(f[2]*opacity+b[2]*(1-opacity));}catch(e){return base;}
}

/* вФАвФА –Ъ–∞—Б—В–Њ–Љ–љ—Л–є select (csel) вАФ –і–µ–ї–µ–≥–Є—А–Њ–≤–∞–љ–Є–µ —Б–Њ–±—Л—В–Є–є вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
   cselClose  вАФ —Б–Ї—А—Л–≤–∞–µ—В –≤—Б–µ –Њ—В–Ї—А—Л—В—Л–µ –і—А–Њ–њ–і–∞—Г–љ—Л
   cselOpen   вАФ –њ–Њ–Ј–Є—Ж–Є–Њ–љ–Є—А—Г–µ—В –Є –њ–Њ–Ї–∞–Ј—Л–≤–∞–µ—В –і—А–Њ–њ–і–∞—Г–љ —З–µ—А–µ–Ј position:fixed
   click@doc  вАФ .csel-trg вЖТ –Њ—В–Ї—А—Л—В—М/–Ј–∞–Ї—А—Л—В—М; .csel-opt вЖТ –≤—Л–±—А–∞—В—М —В–µ–Љ—Г;
                –≤–љ–µ .csel вЖТ –Ј–∞–Ї—А—Л—В—М –≤—Б—С */
function cselClose(){
  document.querySelectorAll('.csel-drop').forEach(function(d){d.style.display='none';});
  document.querySelectorAll('.csel-trg.open').forEach(function(t){t.classList.remove('open');});
}
function cselOpen(trg){
  var csel=trg.closest('.csel');if(!csel)return;
  var drop=csel.querySelector('.csel-drop');if(!drop)return;
  var wasOpen=drop.style.display==='block';
  cselClose();
  if(!wasOpen){
    var r=trg.getBoundingClientRect();
    drop.style.left=r.left+'px';
    drop.style.width=Math.max(130,r.width)+'px';
    drop.style.top=(r.bottom+3)+'px';
    drop.style.bottom='auto';
    drop.style.display='block';
    var dr=drop.getBoundingClientRect();
    if(dr.bottom>window.innerHeight-8){
      drop.style.top='auto';
      drop.style.bottom=(window.innerHeight-r.top+3)+'px';
    }
    trg.classList.add('open');
  }
}
document.addEventListener('click',function(e){
  var trg=e.target.closest('.csel-trg');
  if(trg){cselOpen(trg);return;}
  var opt=e.target.closest('.csel-opt');
  if(opt){
    var csel=opt.closest('.csel');if(!csel)return;
    var val=opt.dataset.val||'';
    if(csel.dataset.libkey) updLibTheme(csel.dataset.libkey,val);
    else updCatTheme(csel.dataset.sec,csel.dataset.key,val);
    var lbl=csel.querySelector('.csel-val');if(lbl)lbl.textContent=val||'вАФ –љ–µ—В вАФ';
    csel.querySelectorAll('.csel-opt').forEach(function(o){o.classList.toggle('csel-sel',o.dataset.val===val);});
    cselClose();
    return;
  }
  if(!e.target.closest('.csel'))cselClose();
});

/* вФАвФА –Ґ–µ–Љ–∞ (light / dark) вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА */
(function(){var t=localStorage.getItem('rfe-theme')||'light';document.body.setAttribute('data-theme',t);applyTh(t);})();
function applyTh(t){document.getElementById('th-toggle').classList.toggle('on',t==='light');}
function toggleTheme(){var n=document.body.getAttribute('data-theme')==='dark'?'light':'dark';document.body.setAttribute('data-theme',n);localStorage.setItem('rfe-theme',n);applyTh(n);}

/* вФАвФА –Ґ–Њ—Б—В-—Г–≤–µ–і–Њ–Љ–ї–µ–љ–Є–µ вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА */
function toast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('on');setTimeout(function(){e.classList.remove('on');},2400);}

/* вФАвФА –Ч–∞–≥—А—Г–Ј–Ї–∞ –і–∞–љ–љ—Л—Е (async IIFE) вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА */
(async function(){
  try{
    var rs=await Promise.all([fetch('../public/db.json').then(function(r){return r.json();}),fetch('../public/config.json').then(function(r){return r.json();})]);
    S.db=JSON.parse(JSON.stringify(rs[0]));S.cfg=JSON.parse(JSON.stringify(rs[1]));
    sw('skills');
  }catch(e){document.getElementById('loading').textContent='–Ю—И–Є–±–Ї–∞: '+e.message;}
})();

/* вФАвФА –Т–Ї–ї–∞–і–Ї–Є вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
   sw(id) вАФ –њ–µ—А–µ–Ї–ї—О—З–∞–µ—В –≤–Ї–ї–∞–і–Ї—Г –Є –≤—Л–Ј—Л–≤–∞–µ—В render()
   render() вАФ –і–Є—Б–њ–µ—В—З–µ—А: –≤—Л–Ј—Л–≤–∞–µ—В –љ—Г–ґ–љ—Л–є renderXxx() –њ–Њ –Ј–љ–∞—З–µ–љ–Є—О TAB */
var TAB_IDS=['skills','magic','shop','glossary','classes','races','config','logs','preview'];
function sw(id){TAB=id;CAT=null;document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('on',TAB_IDS[i]===id);});render();}
function render(){
  if(!S.db)return;
  var ct=document.getElementById('ct');
  if(TAB!=='preview'){ct.style.cssText='flex:1;overflow-y:auto;padding:16px';}
  if(TAB==='skills')renderCats('skills');
  else if(TAB==='magic')renderCats('magic');
  else if(TAB==='shop')renderShop();
  else if(TAB==='glossary')renderGlossary();
  else if(TAB==='classes')renderClasses();
  else if(TAB==='races')renderRaces();
  else if(TAB==='config')renderConfig();
  else if(TAB==='logs')renderLogs();
  else if(TAB==='preview')renderPreview();
}

/* вФАвФА –Э–µ—З—С—В–Ї–∞—П –њ–Њ–і—Б–≤–µ—В–Ї–∞ —В–µ—А–Љ–Є–љ–Њ–≤ –≥–ї–Њ—Б—Б–∞—А–Є—П вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
   levenDist вАФ —А–∞—Б—Б—В–Њ—П–љ–Є–µ –Ы–µ–≤–µ–љ—И—В–µ–є–љ–∞ (–љ–Є–ґ–љ–Є–є —А–µ–≥–Є—Б—В—А)
   hl(text)  вАФ —Н–Ї—А–∞–љ–Є—А—Г–µ—В —В–µ–Ї—Б—В –Є –Њ–±–Њ—А–∞—З–Є–≤–∞–µ—В –љ–∞–є–і–µ–љ–љ—Л–µ —В–µ—А–Љ–Є–љ—Л –≤ <strong> */
function levenDist(s1,s2){s1=s1.toLowerCase();s2=s2.toLowerCase();var c=[];for(var i=0;i<=s1.length;i++){var lv=i;for(var j=0;j<=s2.length;j++){if(i===0){c[j]=j;continue;}if(j>0){var nv=c[j-1];if(s1[i-1]!==s2[j-1])nv=Math.min(nv,lv,c[j])+1;c[j-1]=lv;lv=nv;}}if(i>0)c[s2.length]=lv;}return c[s2.length];}
function hl(text){
  if(!text||!S.db||!S.db.glossary||!S.db.glossary.length)return eH(text);
  var safe=eH(text);
  var glos=S.db.glossary.map(function(g){var t=g.term.trim();return{term:t,wc:t.split(/\s+/).length};});
  var maxW=Math.max.apply(null,glos.map(function(g){return g.wc;}).concat([1]));
  var tokens=safe.split(/([A-Za-z–Р-–ѓ–∞-—П–Б—С]+)/);
  var out='';
  for(var i=0;i<tokens.length;i++){
    if(!/^[A-Za-z–Р-–ѓ–∞-—П–Б—С]+$/.test(tokens[i])){out+=tokens[i];continue;}
    var matched=false;
    for(var w=maxW;w>=1;w--){
      var ct=[],wf=0,j=i;
      while(j<tokens.length&&wf<w){ct.push(tokens[j]);if(/^[A-Za-z–Р-–ѓ–∞-—П–Б—С]+$/.test(tokens[j]))wf++;j++;}
      if(wf!==w)continue;
      var orig=ct.join('');
      var cmp=ct.filter(function(t){return /^[A-Za-z–Р-–ѓ–∞-—П–Б—С]+$/.test(t);}).join(' ');
      var best=0;
      glos.filter(function(g){return g.wc===w;}).forEach(function(g){var sim=1-levenDist(cmp,g.term)/Math.max(cmp.length,g.term.length);if(sim>best)best=sim;});
      if(best>=0.75){out+='<strong>'+orig+'</strong>';i=j-1;matched=true;break;}
    }
    if(!matched)out+=tokens[i];
  }
  return out;
}

/* вФАвФА –†–µ—Б—Г—А—Б—Л вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
   resLbl вАФ –≤–Њ–Ј–≤—А–∞—Й–∞–µ—В –ї–Њ–Ї–∞–ї–Є–Ј–Њ–≤–∞–љ–љ–Њ–µ –љ–∞–Ј–≤–∞–љ–Є–µ —А–µ—Б—Г—А—Б–∞ –њ–Њ –Ї–ї—О—З—Г */
function resLbl(k){var r=S.cfg.resources||{};return r[k]||k;}

/* вФАвФА –С—Л—Б—В—А–Њ–µ –Њ–±–љ–Њ–≤–ї–µ–љ–Є–µ –њ–Њ–ї—П —Н–ї–µ–Љ–µ–љ—В–∞ вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
   sf      вАФ –і–ї—П –љ–∞–≤—Л–Ї–Њ–≤/–Љ–∞–≥–Є–Є (S.db[sec][cat].items[i][field])
   sfShop  вАФ –і–ї—П –ї–∞–≤–Ї–Є (S.db.shop[cat].items[i][field]) */
function sf(el,isNum){S.db[el.dataset.s][el.dataset.c].items[+el.dataset.i][el.dataset.f]=isNum?(+el.value):el.value;}
function sfShop(el,isNum){S.db.shop[el.dataset.c].items[+el.dataset.i][el.dataset.f]=isNum?(+el.value):el.value;}

/* вФАвФА –°–≤—С—А—В—Л–≤–∞–љ–Є–µ/—А–∞–Ј–≤–Њ—А–∞—З–Є–≤–∞–љ–Є–µ –Ї–∞—В–µ–≥–Њ—А–Є–є вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
   CAT_OPEN вАФ —Б–ї–Њ–≤–∞—А—М "sec:cat" вЖТ bool; false = —Б–≤—С—А–љ—Г—В–Њ
   collapseAllCats вАФ –њ–µ—А–µ–Ї–ї—О—З–∞–µ—В –≤—Б–µ –Ї–∞—В–µ–≥–Њ—А–Є–Є —Б–µ–Ї—Ж–Є–Є –Њ–і–љ–Њ–≤—А–µ–Љ–µ–љ–љ–Њ */
var CAT_OPEN={};
function toggleCatOpen(sec,cat){var k=sec+':'+cat;CAT_OPEN[k]=CAT_OPEN[k]===false?true:false;}
function collapseAllCats(sec){
  var keys=sec==='shop'?Object.keys(S.db.shop):Object.keys(S.db[sec]);
  var anyOpen=keys.some(function(c){return CAT_OPEN[sec+':'+c]!==false;});
  keys.forEach(function(c){CAT_OPEN[sec+':'+c]=!anyOpen;});
  if(sec==='shop')renderShop();else renderCats(sec);
}

/* вФАвФА –Ъ–∞—Б—В–Њ–Љ–љ—Л–µ —Б—В–Њ–ї–±—Ж—Л (customCols) вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
   addCustomCol(sec)  вАФ –і–Њ–±–∞–≤–ї—П–µ—В —Б—В–Њ–ї–±–µ—Ж —Б prompt, –њ—А–Њ–Ї–Є–і—Л–≤–∞–µ—В –њ–Њ–ї–µ –≤–Њ –≤—Б–µ items
   addCustomColShop   вАФ –њ—Б–µ–≤–і–Њ–љ–Є–Љ –і–ї—П addCustomCol('shop')
   updColLabel        вАФ –њ–µ—А–µ–Є–Љ–µ–љ–Њ–≤—Л–≤–∞–µ—В —Б—В–Њ–ї–±–µ—Ж (–Ї–∞—Б—В–Њ–Љ–љ—Л–є –Є–ї–Є –≤—Б—В—А–Њ–µ–љ–љ—Л–є —З–µ—А–µ–Ј colLabels)
   delCustomCol       вАФ —Г–і–∞–ї—П–µ—В —Б—В–Њ–ї–±–µ—Ж –Є –њ–µ—А–µ—А–Є—Б–Њ–≤—Л–≤–∞–µ—В —В–∞–±–ї–Є—Ж—Г + –Ї–Њ–љ—Д–Є–≥ */
function customCols(sec){return((S.cfg.customCols||{})[sec])||[];}
function addCustomCol(sec){
  var key=prompt('–Ъ–ї—О—З —Б—В–Њ–ї–±—Ж–∞ (English, –љ–∞–њ—А–Є–Љ–µ—А range):');if(!key)return;
  key=key.trim().replace(/\s+/g,'_');
  if(!S.cfg.customCols)S.cfg.customCols={};
  if(!S.cfg.customCols[sec])S.cfg.customCols[sec]=[];
  if(S.cfg.customCols[sec].find(function(c){return c.key===key;})){alert('–Ъ–ї—О—З ¬Ђ'+key+'¬ї —Г–ґ–µ —Б—Г—Й–µ—Б—В–≤—Г–µ—В');return;}
  var label=prompt('–Э–∞–Ј–≤–∞–љ–Є–µ –і–ї—П –Є–љ—В–µ—А—Д–µ–є—Б–∞ (—А—Г—Б—Б–Ї–Њ–µ):');if(!label)return;
  S.cfg.customCols[sec].push({key:key,label:label});
  Object.keys(S.db[sec]).forEach(function(cat){S.db[sec][cat].items.forEach(function(it){if(it[key]===undefined)it[key]='';});});
  renderCats(sec);CFG_OPEN.cols=true;sw('config');setTimeout(function(){var el=document.getElementById('cfg-panel-cols');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},80);
}
function addCustomColShop(){addCustomCol('shop');}
function updColLabel(sec,key,label){
  var list=(S.cfg.customCols||{})[sec]||[];
  var col=list.find(function(c){return c.key===key;});
  if(col){col.label=label;return;}
  if(!S.cfg.colLabels)S.cfg.colLabels={};
  if(!S.cfg.colLabels[sec])S.cfg.colLabels[sec]={};
  S.cfg.colLabels[sec][key]=label;
}
function delCustomCol(sec,key){
  if(!S.cfg.customCols||!S.cfg.customCols[sec])return;
  S.cfg.customCols[sec]=S.cfg.customCols[sec].filter(function(c){return c.key!==key;});
  var fn=sec==='shop'?renderShop:function(){renderCats(sec);};fn();
  renderConfig();
}

/* вФАвФА –†–µ—Б–∞–є–Ј —Б—В–Њ–ї–±—Ж–Њ–≤ –Љ—Л—И—М—О вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
   initCR(id) вАФ –≤–µ—И–∞–µ—В mousedown –љ–∞ .cr —Е—Н–љ–і–ї—Л –≤–љ—Г—В—А–Є —В–∞–±–ї–Є—Ж—Л #id;
     mv(e) вАФ –Њ–±–љ–Њ–≤–ї—П–µ—В —И–Є—А–Є–љ—Г th –Є –≤—Б–µ—Е th —Б —В–µ–Љ –ґ–µ data-key+data-sec
     up()  вАФ —Б–љ–Є–Љ–∞–µ—В —Б–ї—Г—И–∞—В–µ–ї–Є –Є —Г–±–Є—А–∞–µ—В active-–Ї–ї–∞—Б—Б */
function initCR(id){
  var t=document.getElementById(id);if(!t)return;
  t.querySelectorAll('th').forEach(function(th){
    var h=th.querySelector('.cr');if(!h)return;
    h.addEventListener('mousedown',function(e){
      e.preventDefault();e.stopPropagation();
      var sx=e.pageX,sw=th.offsetWidth;h.classList.add('act');
      function mv(e){
        var w=Math.max(36,sw+e.pageX-sx)+'px';
        th.style.width=w;
        if(th.dataset.key&&th.dataset.sec){
          document.querySelectorAll('th[data-key="'+th.dataset.key+'"][data-sec="'+th.dataset.sec+'"]').forEach(function(o){o.style.width=w;});
        }
      }
      function up(){h.classList.remove('act');document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);}
      document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
    });
  });
}

/* вФАвФА Inline-—А–µ–і–∞–Ї—В–Є—А–Њ–≤–∞–љ–Є–µ —П—З–µ–µ–Ї —В–∞–±–ї–Є—Ж—Л вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
   startInlineEdit(td, curVal, onSave) вАФ –Ј–∞–Љ–µ–љ—П–µ—В td –љ–∞ textarea —Б –∞–≤—В–Њ—Б–Њ—Е—А–∞–љ–µ–љ–Є–µ–Љ;
     commit() вАФ —Б–Њ—Е—А–∞–љ—П–µ—В –Ј–љ–∞—З–µ–љ–Є–µ —З–µ—А–µ–Ј onSave –Є –≤–Њ–Ј–≤—А–∞—Й–∞–µ—В td –≤ –Є—Б—Е–Њ–і–љ—Л–є –≤–Є–і
   inlineSkillDesc / inlineShopEffect / inlineGlossDef вАФ –Њ–±—С—А—В–Ї–Є –і–ї—П –Ї–Њ–љ–Ї—А–µ—В–љ—Л—Е –њ–Њ–ї–µ–є */
function startInlineEdit(td,curVal,onSave){
  if(td.querySelector('textarea'))return;
  var tdH=td.offsetHeight;
  td.innerHTML='';
  var ta=document.createElement('textarea');
  ta.className='td-hl-ta';
  ta.value=curVal;
  td.appendChild(ta);
  ta.style.height=Math.max(ta.scrollHeight,tdH)+'px';
  ta.focus();
  ta.addEventListener('input',function(){ta.style.height='auto';ta.style.height=Math.max(ta.scrollHeight,52)+'px';});
  var saved=false;
  function commit(){
    if(saved)return;saved=true;
    onSave(ta.value);
    td.innerHTML=hl(ta.value);
  }
  ta.addEventListener('blur',commit);
  ta.addEventListener('keydown',function(e){
    if(e.key==='Escape'){saved=true;td.innerHTML=hl(curVal);e.preventDefault();}
  });
}
function inlineSkillDesc(td){
  var sec=td.dataset.sec,cat=td.dataset.cat,idx=+td.dataset.idx;
  var item=S.db[sec][cat].items[idx];
  startInlineEdit(td,item.desc||'',function(v){item.desc=v;});
}
function inlineShopEffect(td){
  var cat=td.dataset.cat,idx=+td.dataset.idx;
  var item=S.db.shop[cat].items[idx];
  startInlineEdit(td,item.effect||'',function(v){item.effect=v;});
}
function inlineGlossDef(td){
  var idx=+td.dataset.idx;
  startInlineEdit(td,S.db.glossary[idx].def||'',function(v){S.db.glossary[idx].def=v;});
}

/* вФАвФА –Э–∞–≤—Л–Ї–Є –Є –Љ–∞–≥–Є—П вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
   renderCats(sec)  вАФ –њ–µ—А–µ–±–Є—А–∞–µ—В –Ї–∞—В–µ–≥–Њ—А–Є–Є, —Б—В—А–Њ–Є—В HTML —З–µ—А–µ–Ј catSection
   catSection       вАФ –Ј–∞–≥–Њ–ї–Њ–≤–Њ–Ї –Ї–∞—В–µ–≥–Њ—А–Є–Є + —В–∞–±–ї–Є—Ж–∞ items + DnD-—Е—Н–љ–і–ї—Л
   –Ъ–∞—Б—В–Њ–Љ–љ—Л–є dropdown —В–Є–њ–∞/–Ї—А—Г–≥–∞/–љ–∞–њ—А–∞–≤–ї–µ–љ–Є—П/—А–µ—Б—Г—А—Б–∞: openXxxDD вЖТ _ddPos вЖТ _ddFinish
   pasteFromSheet   вАФ –≤—Б—В–∞–≤–Ї–∞ –Є–Ј Google Sheets (TSV —Б –Љ–љ–Њ–≥–Њ—Б—В—А–Њ—З–љ—Л–Љ–Є —П—З–µ–є–Ї–∞–Љ–Є)
   cSecDs/Do/Dl/Dd  вАФ DnD –Ї–∞—В–µ–≥–Њ—А–Є–є –Љ–µ–ґ–і—Г —Б–Њ–±–Њ–є */
var SKILL_TYPES=['–њ–∞—Б—Б–Є–≤–љ—Л–є','—Б—В–Њ–є–Ї–∞','–∞—В–∞–Ї–∞','–Ј–∞—Й–Є—В–∞','–Љ–∞–љ—С–≤—А','–њ—А–Є—С–Љ','–њ–Њ–Љ–Њ—Й—М'];

  {name:'–І–∞—А–Њ–і–µ–є—Б—В–≤–Њ',  subs:['–Р—Б—В—А–Њ–Љ–∞–љ—В–Є—П','–Т–Њ–ї—И–±–∞','–Ш–љ–Ї–∞–љ—В–∞—Ж–Є—П']},

  {name:'–Ф—А—Г–Є–і–Є–Ј–Љ',     subs:['–Ю–±–Њ—А–Њ—В–љ–Є—З–µ—Б—В–≤–Њ','–Ґ—А–∞–≤–Њ–Ј–љ–∞–љ–Є–µ','–°—В–Є—Е–Є–µ–њ–Њ–≤–µ–ї–µ–≤–∞–љ–Є–µ']},
  {name:'–®–∞–Љ–∞–љ–Є–Ј–Љ',     subs:['–°–њ–Є—А–Є—В–Є–Ј–Љ','–°—В–Є—Е–Є–Є–≤–Ј—Л–≤–∞–љ–Є–µ','–Ч–≤–µ—А–Њ–Ј–≤–∞–љ–Є–µ']},
  {name:'–Э–µ–Ї—А–Њ–Љ–∞–љ—В–Є—П',  subs:['–£–Љ–µ—А—В–≤–ї–µ–љ–Є–µ','–Ь–µ—А—В–≤–Њ—А–Њ–ґ–і–µ–љ–Є–µ','–Ц–Є–Ј–љ–µ–≤–Њ—А–Њ—В']},
  {name:'–Ц—А–µ—З–µ—Б—В–≤–Њ',    subs:['–°–≤—П—В–Њ—Б–ї–Њ–≤–Є–µ','–С–ї–∞–≥–Њ—Б–ї–Њ–≤–µ–љ–Є–µ','–Р–љ–≥–µ–ї–Њ–≥—А–∞—Д–Є—П']},
  {name:'–Т–Њ–ї–µ–Є–Ј—К—П–≤–ї–µ–љ–Є–µ',subs:['–°—В–Є—Е–Є–µ–Ї–Є–љ–µ–Ј','–У–ї–∞—Б–Њ–≤–ї–∞–і–µ–љ–Є–µ','–Я—Б–Є—Е–Њ–Ї–Є–љ–µ–Ј']},
  {name:'–†–Є—В—Г–∞–ї–Є–Ј–Љ',    subs:['–Ц–µ—А—В–≤–Њ–њ—А–µ–і–∞–љ–Є–µ','–Ы–Є—В—Г—А–≥–Є—П','–Ь–Є—Б—В–Є—Ж–Є–Ј–Љ']}
];
function getMagicCircles(){return(S&&S.cfg&&S.cfg.magicCircles)||DEFAULT_MAGIC_CIRCLES;}
function getMagicDirections(){return(S&&S.cfg&&S.cfg.magicDirections)||DEFAULT_MAGIC_DIRS;}

/* вФАвФА Dropdown —В–Є–њ–∞/–Ї—А—Г–≥–∞/–љ–∞–њ—А–∞–≤–ї–µ–љ–Є—П/—А–µ—Б—Г—А—Б–∞ вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
   openXxxDD    вАФ –Њ—В–Ї—А—Л–≤–∞–µ—В –і—А–Њ–њ–і–∞—Г–љ –і–ї—П –Ї–Њ–љ–Ї—А–µ—В–љ–Њ–≥–Њ –њ–Њ–ї—П (type/circle/direction/resource)
   _ddPos(btn,panel) вАФ –њ–Њ–Ј–Є—Ж–Є–Њ–љ–Є—А—Г–µ—В panel —З–µ—А–µ–Ј getBoundingClientRect()
   _ddFinish    вАФ –Њ–±–љ–Њ–≤–ї—П–µ—В –і–∞–љ–љ—Л–µ, –Ј–∞–Ї—А—Л–≤–∞–µ—В –њ–∞–љ–µ–ї—М, –њ–µ—А–µ—А–Є—Б–Њ–≤—Л–≤–∞–µ—В */
var _DD=null;
function closeDD(){
  if(!_DD)return;
  _DD.panel.remove();
  if(_DD.btn)_DD.btn.classList.remove('dd-open');
  document.removeEventListener('mousedown',_DD.outside,true);
  _DD=null;
}
function _ddPos(btn,panel){
  var rect=btn.getBoundingClientRect();
  var ph=panel.offsetHeight;
  var spB=window.innerHeight-rect.bottom-4,spA=rect.top-4;
  var top=(spB>=ph||spB>=spA)?rect.bottom+2:rect.top-ph-2;
  panel.style.left=rect.left+'px';panel.style.top=top+'px';
  panel.style.minWidth=Math.max(rect.width,110)+'px';
}
function _ddFinish(btn,panel){
  document.body.appendChild(panel);
  _ddPos(btn,panel);
  btn.classList.add('dd-open');
  _DD={panel:panel,btn:btn,outside:function(e){if(!panel.contains(e.target)&&e.target!==btn)closeDD();}};
  setTimeout(function(){document.addEventListener('mousedown',_DD.outside,true);},0);
}
function openTypeDD(btn,types,curVal,onPick){
  closeDD();
  var panel=document.createElement('div');
  panel.className='type-dd-panel';
  types.forEach(function(t){
    var val=typeof t==='object'?t.val:t;
    var lbl=typeof t==='object'?t.label:t;
    var opt=document.createElement('div');
    opt.className='type-dd-opt'+(val===curVal?' dd-sel':'');
    opt.textContent=lbl;
    opt.onmousedown=function(e){e.preventDefault();onPick(val);closeDD();};
    panel.appendChild(opt);
  });
  _ddFinish(btn,panel);
}
function openGroupedDD(btn,groups,curVal,onPick){
  closeDD();
  var panel=document.createElement('div');
  panel.className='type-dd-panel';
  var clr=document.createElement('div');
  clr.className='type-dd-opt'+((!curVal||curVal==='вАФ')?' dd-sel':'');
  clr.textContent='вАФ';
  clr.onmousedown=function(e){e.preventDefault();onPick('');closeDD();};
  panel.appendChild(clr);
  groups.forEach(function(g){
    var ghdr=document.createElement('div');
    ghdr.className='type-dd-grp';
    ghdr.textContent=g.name;
    panel.appendChild(ghdr);
    (g.subs||[]).forEach(function(s){
      var opt=document.createElement('div');
      opt.className='type-dd-opt type-dd-sub'+(s===curVal?' dd-sel':'');
      opt.textContent=s;
      opt.onmousedown=function(e){e.preventDefault();onPick(s);closeDD();};
      panel.appendChild(opt);
    });
  });
  _ddFinish(btn,panel);
  setTimeout(function(){document.addEventListener('mousedown',_DD.outside,true);},0);
}
function openSkillTypeDD(btn){
  var sec=btn.dataset.s,cat=btn.dataset.c,idx=+btn.dataset.i;
  var cur=(S.db[sec][cat].items[idx]||{}).type||'';
  openTypeDD(btn,getItemTypes(sec),cur,function(v){S.db[sec][cat].items[idx].type=v;renderCats(sec);});
}
function openShopTypeDD(btn){

function _resItems(){return Object.keys(S.cfg.resources||{}).map(function(k){return{val:k,label:(S.cfg.resources[k]||k)};});}
function openSkillResDD(btn){

function getDirCircles(dirVal){
  if(!dirVal)return getMagicCircles();
  var dirs=getMagicDirections();
  var d=dirs.find(function(g){return g.name===dirVal;});
  if(!d)d=dirs.find(function(g){return(g.subs||[]).indexOf(dirVal)>=0;});

function openDirDD(btn){
  var sec=btn.dataset.s,cat=btn.dataset.c,idx=+btn.dataset.i;
  var cur=(S.db[sec][cat].items[idx]||{}).direction||'';
  var catLabel=(S.db[sec][cat]&&(S.db[sec][cat].label||cat))||cat;
  var all=getMagicDirections();
  var matched=all.find(function(g){return g.name===catLabel||g.name===cat;});
  var cb=function(v){S.db[sec][cat].items[idx].direction=v;renderCats(sec);};
  if(matched){
    openTypeDD(btn,[{val:'',label:'вАФ'}].concat(matched.subs||[]),cur,cb);

    openGroupedDD(btn,all,cur,cb);
  }
}

function renderCats(sec){
  var cats=Object.keys(S.db[sec]);
  var anyOpen=cats.some(function(c){return CAT_OPEN[sec+':'+c]!==false;});
  var h='<div class="tbar"><h2>'+(sec==='skills'?'–Э–∞–≤—Л–Ї–Є':'–Ь–∞–≥–Є—П')+'</h2>'+
    '<button class="btn btn-sm collapse-all-btn" data-s="'+eA(sec)+'" onclick="collapseAllCats(this.dataset.s)" title="'+(anyOpen?'–°–≤–µ—А–љ—Г—В—М –≤—Б—С':'–†–∞–Ј–≤–µ—А–љ—Г—В—М –≤—Б—С')+'">'+(anyOpen?'вЦ≤':'вЦЉ')+'</button>'+
    '<button class="btn btn-sm" data-s="'+eA(sec)+'" onclick="addCat(this.dataset.s)">+ –Ъ–∞—В–µ–≥–Њ—А–Є—П</button></div>';

/* вФАвФА –Т—Б—В–∞–≤–Ї–∞ –Є–Ј Google Sheets (TSV) вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
   parseTSV     вАФ RFC-4180 –њ–∞—А—Б–µ—А: —Н–Ї—А–∞–љ–Є—А–Њ–≤–∞–љ–љ—Л–µ " –Є –њ–µ—А–µ–љ–Њ—Б—Л —Б—В—А–Њ–Ї
   pasteFromSheet вАФ —З–Є—В–∞–µ—В –±—Г—Д–µ—А –Њ–±–Љ–µ–љ–∞ –Є –і–Њ–±–∞–≤–ї—П–µ—В —Б—В—А–Њ–Ї–Є –≤ –Ї–∞—В–µ–≥–Њ—А–Є—О */
function parseTSV(text){
  var rows=[],i=0,n=text.length;
  while(i<n){
    var row=[];
    for(;;){
      var field='';
      if(i<n&&text[i]==='"'){
        i++;
        while(i<n){
          if(text[i]==='"'&&i+1<n&&text[i+1]==='"'){field+='"';i+=2;}
          else if(text[i]==='"'){i++;break;}
          else field+=text[i++];
        }
      } else {
        while(i<n&&text[i]!=='\t'&&text[i]!=='\n'&&text[i]!=='\r')field+=text[i++];
      }
      row.push(field);
      if(i>=n||text[i]==='\n'||text[i]==='\r')break;
      i++;
    }
    if(i<n&&text[i]==='\r')i++;
    if(i<n&&text[i]==='\n')i++;
    if(row.some(function(c){return c.trim()!=='';}))rows.push(row);
  }
  return rows;
}
function pasteFromSheet(sec,cat){
  navigator.clipboard.readText().then(function(text){
    if(!text.trim()){toast('–С—Г—Д–µ—А –њ—Г—Б—В');return;}
    var rows=parseTSV(text);
    if(!rows.length){toast('–Э–µ—В –і–∞–љ–љ—Л—Е');return;}
    var keys=getColOrder(sec);
    var added=0;
    rows.forEach(function(rawCols){
      var cols=rawCols.slice();
      while(cols.length>0&&cols[cols.length-1].trim()==='')cols.pop();
      var item={};
      if(cols.length>=keys.length){
        keys.forEach(function(k,idx){item[k]=idx<cols.length?cols[idx]:'';});
      } else {
        var m=cols.length;
        for(var ci=0;ci<m-1&&ci<keys.length-1;ci++)item[keys[ci]]=cols[ci];
        if(m>0)item[keys[keys.length-1]]=cols[m-1];
        for(var ki=m-1;ki<keys.length-1;ki++)if(item[keys[ki]]===undefined)item[keys[ki]]='';
      }
      ['actions','cost','learnCost'].forEach(function(k){if(item[k]!==undefined)item[k]=parseFloat(item[k])||0;});
      if(sec==='shop')S.db.shop[cat].items.push(item);
      else S.db[sec][cat].items.push(item);
      added++;
    });
    render();toast('–Т—Б—В–∞–≤–ї–µ–љ–Њ: '+added+(added%10===1&&added%100!==11?' —Б—В—А–Њ–Ї–∞':added%10>=2&&added%10<=4&&(added%100<10||added%100>=20)?' —Б—В—А–Њ–Ї–Є':' —Б—В—А–Њ–Ї'));
  }).catch(function(){toast('–Э–µ—В –і–Њ—Б—В—Г–њ–∞ –Ї –±—Г—Д–µ—А—Г вАФ —А–∞–Ј—А–µ—И–Є –≤ –±—А–∞—Г–Ј–µ—А–µ');});
}

function toggleAcc(k){ACC[k]=!ACC[k];render();}
function _branchAccent(item,field){
  var db=field==='sk'?S.db.skills:S.db.magic;
  var raw=db[item]&&db[item].accent?db[item].accent+'':'';
  var key=raw.replace('accent-','');
  return key?(((S.cfg.appearance||{}).stripes||{})[key]||{}).accent||null:null;
}
function chipsBlock(label,all,avail,cls,spec,field){
  return '<div class="sub-lbl">'+label+'</div><div class="chips">'+all.map(function(item){
    var on=avail==='all'||avail==='wizard'||(Array.isArray(avail)&&avail.indexOf(item)>=0);
    var accent=_branchAccent(item,field);
    var style=on&&accent?' style="background:'+accent+';border-color:'+accent+'"':'';
    return '<span class="chip'+(on?' on':'')+'"'+style+' data-k="'+eA(cls)+'" '+(spec?'data-sp="'+eA(spec)+'" ':'')+
      'data-it="'+eA(item)+'" data-f="'+eA(field)+'" onclick="toggleAvail(this)">'+eH(item)+'</span>';
  }).join('')+'</div>';
}
function toggleAvail(el){
  var cls=el.dataset.k,spec=el.dataset.sp||null,item=el.dataset.it;
  var field=el.dataset.f==='sk'?'availSkills':'availMagic';
  var target=spec?S.db.classes[cls].specs[spec]:S.db.classes[cls];
  var arr=target[field];if(!Array.isArray(arr)){target[field]=[];arr=target[field];}
  var i=arr.indexOf(item);if(i>=0)arr.splice(i,1);else arr.push(item);
  var accent=_branchAccent(item,el.dataset.f);
  el.classList.toggle('on');
  if(el.classList.contains('on')&&accent){el.style.background=accent;el.style.borderColor=accent;}
  else{el.style.background='';el.style.borderColor='';}
}

function addRace(){var n=prompt('–†–∞—Б–∞:');if(!n)return;S.db.races[n]={art:'',raceBonus:{name:'',desc:''},subraces:{}};CAT=n;renderRaces();}
function deleteRace(race){if(!confirm('–£–і–∞–ї–Є—В—М ¬Ђ'+race+'¬ї?'))return;delete S.db.races[race];CAT=null;renderRaces();}
function addSubrace(race){var n=prompt('–Я–Њ–і—А–∞—Б–∞:');if(!n)return;if(!S.db.races[race].subraces)S.db.races[race].subraces={};S.db.races[race].subraces[n]={art:'',passive:{name:'',desc:''},active:{name:'',desc:''}};ACC[race+'::'+n]=true;renderRaceDet(race);}

function renameRace(oldKey,newKey){
  newKey=newKey.trim();if(!newKey||newKey===oldKey)return;
  if(S.db.races[newKey]){alert('–†–∞—Б–∞ ¬Ђ'+newKey+'¬ї —Г–ґ–µ —Б—Г—Й–µ—Б—В–≤—Г–µ—В');return;}
  S.db.races[newKey]=S.db.races[oldKey];delete S.db.races[oldKey];
  if(!S.cfg.migrationMap)S.cfg.migrationMap={};
  if(!S.cfg.migrationMap.race)S.cfg.migrationMap.race={};
  Object.keys(S.cfg.migrationMap.race).forEach(function(k){if(S.cfg.migrationMap.race[k]===oldKey)S.cfg.migrationMap.race[k]=newKey;});
  S.cfg.migrationMap.race[oldKey]=newKey;
  CAT=newKey;renderRaces();
}
function renameSubrace(race,oldKey,newKey){
  newKey=newKey.trim();if(!newKey||newKey===oldKey)return;
  if(S.db.races[race].subraces[newKey]){alert('–Я–Њ–і—А–∞—Б–∞ ¬Ђ'+newKey+'¬ї —Г–ґ–µ —Б—Г—Й–µ—Б—В–≤—Г–µ—В');return;}
  S.db.races[race].subraces[newKey]=S.db.races[race].subraces[oldKey];
  delete S.db.races[race].subraces[oldKey];
  var oldAk=race+'::'+oldKey,newAk=race+'::'+newKey;
  if(ACC[oldAk]!==undefined){ACC[newAk]=ACC[oldAk];delete ACC[oldAk];}
  if(!S.cfg.migrationMap)S.cfg.migrationMap={};
  if(!S.cfg.migrationMap.subrace)S.cfg.migrationMap.subrace={};
  Object.keys(S.cfg.migrationMap.subrace).forEach(function(k){if(S.cfg.migrationMap.subrace[k]===oldKey)S.cfg.migrationMap.subrace[k]=newKey;});
  S.cfg.migrationMap.subrace[oldKey]=newKey;
  renderRaceDet(race);
}

function initCfgResize(){
  var handle=document.getElementById('ap-resize-handle');
  if(!handle)return;
  var dragging=false,startX=0,startW=0;
  handle.onmousedown=function(e){
    dragging=true;startX=e.clientX;
    var col=document.getElementById('ap-cfg-col');
    startW=col?col.offsetWidth:AP_CFG_WIDTH;
    handle.style.background='var(--accent)';
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    document.onmousemove=function(ev){
      if(!dragging)return;
      var w=Math.max(180,Math.min(620,startW+(ev.clientX-startX)));
      AP_CFG_WIDTH=w;
      var c=document.getElementById('ap-cfg-col');
      if(c)c.style.width=w+'px';
    };
    document.onmouseup=function(){
      dragging=false;
      handle.style.background='var(--border)';
      document.body.style.cursor='';
      document.body.style.userSelect='';
      document.onmousemove=null;document.onmouseup=null;
    };
    e.preventDefault();
  };
  handle.onmouseenter=function(){if(!dragging)handle.style.background='var(--accent)';};
  handle.onmouseleave=function(){if(!dragging)handle.style.background='var(--border)';};
}

function prevHighlight(text,bc){
  var gl=S.db&&S.db.glossary||[];
  if(!gl.length||!text)return eH(text);
  var rgb=hexRgb(bc);
  var ps='color:'+bc+';background:rgba('+rgb+',0.10);border:1px solid rgba('+rgb+',0.30);border-radius:3px;padding:0 4px;font-weight:600;cursor:pointer';
  var terms=gl.map(function(g){return g.term||'';}).filter(Boolean).sort(function(a,b){return b.length-a.length;});
  if(!terms.length)return eH(text);
  var re=new RegExp('('+terms.map(function(t){return t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}).join('|')+')','gi');
  var termSet={};terms.forEach(function(t){termSet[t.toLowerCase()]=true;});
  return text.split(re).map(function(p){
    return termSet[p.toLowerCase()]?'<span style="'+ps+'">'+eH(p)+'</span>':eH(p);
  }).join('');
}

  h+='</div>';

}

  var firstRace=Object.keys(S.db.races||{})[0]||'';

        return cardItem(th,it.name,[it.direction||it.type,it.circle].filter(Boolean).join(' ¬Ј '),it.desc||'',mc.acc);

    if(shopCat){

      h+=panelWrap(th,'–Ы–∞–≤–Ї–∞',shopCat,(scat.items||[]).slice(0,4).map(function(it){

  h+='<div id="mp-row-light" style="display:flex;gap:10px;overflow-x:auto;padding:12px;align-items:stretch;border-radius:10px;'+rowBgStyle(ap,true)+'">';

function toggleApSection(k){AP_SECTION_OPEN[k]=!AP_SECTION_OPEN[k];rebuildApLeft();}

                light:{bgColor:'#c0c0c0',cardBg:'#ffffff',textMain:'#111118',textMuted:'#4a4850'}};

  AP_UI_FIELDS.forEach(function(field){
    var vl=(ap.light||{})[field]||DEFAULTS.light[field]||'#888888';
    var vd=(ap.dark||{})[field]||DEFAULTS.dark[field]||'#888888';
    h+='<tr><td style="font-size:12px">'+eH(AP_UI_LABELS[field]||field)+'</td>';
    h+='<td style="text-align:center">'+apColorPicker('ap-ui-light-'+field,vl,'updUiColor(\'light\',\''+field+'\',this.value)')+'</td>';
    h+='<td style="text-align:center">'+apColorPicker('ap-ui-dark-'+field,vd,'updUiColor(\'dark\',\''+field+'\',this.value)')+'</td>';
    h+='</tr>';
  });
  var gl=ap.glossary||{};
  var badgeL=gl.badgeLight||'#009e9b', badgeD=gl.badgeDark||'#ffc107';
  h+='<tr><td style="font-size:12px" title="–Я–Є–ї—О–ї—П –Ы–µ–≤–µ–љ—И—В–µ–є–љ–∞ –Є –Њ–Ї–Њ–љ—В–Њ–≤–Ї–∞ –њ–Њ–њ–∞–њ–∞ вАФ –Њ–і–Є–љ —Ж–≤–µ—В">–У–ї–Њ—Б—Б–∞—А–Є–є</td>';
  h+='<td style="text-align:center">'+apColorPicker('ap-gl-badge-l',badgeL,'updGlossaryColor(\'badgeLight\',this.value)')+'</td>';
  h+='<td style="text-align:center">'+apColorPicker('ap-gl-badge-d',badgeD,'updGlossaryColor(\'badgeDark\',this.value)')+'</td>';
  h+='</tr>';

function apOpRow(label,id,val,cb){
  var v=parseFloat(val).toFixed(2);
  return'<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'
    +'<span style="font-size:11px;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+eH(label)+'</span>'
    +'<input type="range" id="'+eA(id)+'" min="0" max="1" step="0.01" value="'+eA(v)+'" oninput="'+eA(cb)+'" style="width:80px;flex-shrink:0;cursor:pointer">'
    +'<span id="'+eA(id)+'-val" style="font-size:10px;color:var(--muted);width:26px;text-align:right;flex-shrink:0">'+eH(v)+'</span>'
    +'</div>';
}

function buildApBg(ap){
  var bgUrl=ap.bgImage||'';
  var d=ap.dark||{}, l=ap.light||{};
  var dOv=d.bgOverlay!=null?parseFloat(d.bgOverlay):0.75;
  var lOv=l.bgOverlay!=null?parseFloat(l.bgOverlay):0.70;
  var dScr=d.screenOpacity!=null?parseFloat(d.screenOpacity):0.85;
  var lScr=l.screenOpacity!=null?parseFloat(l.screenOpacity):0.88;
  var h='<input id="ap-bg-url-inp" style="width:100%;box-sizing:border-box;font-size:11px;font-family:monospace;padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:var(--surface2);color:var(--text);outline:none" '+
    'placeholder="https://..." value="'+eA(bgUrl)+'" oninput="updBgImage(this.value)" onchange="updBgImage(this.value)">';
  if(bgUrl){
    h+='<img id="ap-bg-preview" src="'+eA(bgUrl)+'" style="margin-top:8px;width:100%;border-radius:6px;border:1px solid var(--border);display:block;max-height:160px;object-fit:cover" onerror="this.style.display=\'none\'">';
  } else {
    h+='<div id="ap-bg-preview" style="margin-top:8px;border-radius:6px;height:60px;background:var(--surface2);border:1px solid var(--border);opacity:0.5;display:flex;align-items:center;justify-content:center"><span style="font-size:11px;color:var(--muted)">–≤–≤–µ–і–Є URL</span></div>';
  }
  h+='<div style="margin-top:12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:8px">–Э–µ–њ—А–Њ–Ј—А–∞—З–љ–Њ—Б—В—М</div>';
  h+='<div style="font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:600">рЯМЩ –Ґ—С–Љ–љ–∞—П</div>';
  h+=apOpRow('–С–µ–Ј –Љ–µ–љ—О (—Д–Њ–љ)','ap-ov-dark',dOv,"updBgOverlay('dark',this.value)");
  h+=apOpRow('–≠–Ї—А–∞–љ—Л –њ–Њ–≤–µ—А—Е','ap-scr-dark',dScr,"updScreenOpacity('dark',this.value)");
  h+='<div style="font-size:10px;color:var(--muted);margin:8px 0 4px;font-weight:600">вША –°–≤–µ—В–ї–∞—П</div>';
  h+=apOpRow('–С–µ–Ј –Љ–µ–љ—О (—Д–Њ–љ)','ap-ov-light',lOv,"updBgOverlay('light',this.value)");
  h+=apOpRow('–≠–Ї—А–∞–љ—Л –њ–Њ–≤–µ—А—Е','ap-scr-light',lScr,"updScreenOpacity('light',this.value)");
  return h;
}


function updGlossaryColor(k,val){
  var ap=getAp();if(!ap.glossary)ap.glossary={};
  ap.glossary[k]=val;refreshPreviewRight();
}

function addCustomStripe(){
  var name=prompt('–Э–∞–Ј–≤–∞–љ–Є–µ —В–µ–Љ—Л (—В–Њ–ї—М–Ї–Њ a-z, 0-9, - _):');
  if(!name)return;
  name=name.trim().replace(/[^a-z0-9_-]/gi,'').toLowerCase();
  if(!name){toast('–Э–µ–і–Њ–њ—Г—Б—В–Є–Љ–Њ–µ –љ–∞–Ј–≤–∞–љ–Є–µ');return;}
  var ap=getAp();
  if(ap.stripes[name]){toast('–Ґ–µ–Љ–∞ ¬Ђ'+name+'¬ї —Г–ґ–µ —Б—Г—Й–µ—Б—В–≤—Г–µ—В');return;}
  ap.stripes[name]={accent:'#888888',darkBg:'#222222',lightBg:'#f0f0f0',lightAccent:'#666666'};
  rebuildApLeft();refreshPreviewRight();
}

function delCustomStripe(name){
  if(AP_BUILTIN_STRIPES.indexOf(name)>=0)return;
  var ap=getAp();
  delete ap.stripes[name];
  rebuildApLeft();refreshPreviewRight();
}

function cfgPanel(key,title,body,foot){
  var open=CFG_OPEN[key];
  return '<div class="panel" id="cfg-panel-'+key+'">'+
    '<h3 onclick="toggleCfg(\''+key+'\')"><span class="ph-arr">'+(open?'вЦЉ':'вЦґ')+'</span>'+title+'</h3>'+
    (open?'<div class="panel-body">'+body+(foot?'<div style="margin-top:8px">'+foot+'</div>':'')+'</div>':'')+
  '</div>';
}

    cfgPanel('cols','–°—В–Њ–ї–±—Ж—Л',colBody,'')+

    cfgPanel('circles','–Ъ—А—Г–≥–Є –Љ–∞–≥–Є–Є',circleBody,'')+
    cfgPanel('dirs','–Э–∞–њ—А–∞–≤–ї–µ–љ–Є—П –Љ–∞–≥–Є–Є',dirBody,'')+
    cfgPanel('vl','allVladenie','<textarea class="dr-ta" style="min-height:42px" onchange="S.cfg.allVladenie=pcsv(this.value)">'+eH(cfg.allVladenie.join(', '))+'</textarea>','')+
    cfgPanel('kh','allKhar','<textarea class="dr-ta" style="min-height:42px" onchange="S.cfg.allKhar=pcsv(this.value)">'+eH(cfg.allKhar.join(', '))+'</textarea>','')+
    cfgPanel('worker','–Ч–∞–≥—А—Г–Ј–Ї–∞ –Є–Ј–Њ–±—А–∞–ґ–µ–љ–Є–є',
        '<div style="font-size:11px;color:var(--muted);margin-bottom:8px;">Cloudflare Worker –і–ї—П –Ј–∞–≥—А—Г–Ј–Ї–Є –Є–Ј–Њ–±—А–∞–ґ–µ–љ–Є–є –љ–∞ imgBB. –Х—Б–ї–Є –љ–µ –Ј–∞–і–∞–љ вАФ –Є–Ј–Њ–±—А–∞–ґ–µ–љ–Є—П —Е—А–∞–љ—П—В—Б—П –ї–Њ–Ї–∞–ї—М–љ–Њ.</div>'
        +'<label style="font-size:11px;color:var(--muted);display:block;margin-bottom:3px;">Worker URL</label>'
        +'<input type="text" class="dr-inp" placeholder="https://upload.example.workers.dev" value="'+eH(cfg.uploadUrl||cfg.workerUrl||'')+'" oninput="S.cfg.uploadUrl=this.value.trim()" style="font-family:monospace;width:100%;box-sizing:border-box;">',

/* вФАвФА –Т—Б–њ–ї—Л–≤–∞—О—Й–µ–µ –Њ–Ї–љ–Њ –≤—Л–±–Њ—А–∞ —Ж–≤–µ—В–∞ (stat colors) вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
   openCpop вАФ –њ—А–Є–≤—П–Ј—Л–≤–∞–µ—В #cpop –Ї –њ–Њ–Ј–Є—Ж–Є–Є –Ї–ї–Є–Ї–љ—Г—В–Њ–≥–Њ .cfg-swatch
   closeCpop вАФ —Б–Ї—А—Л–≤–∞–µ—В –њ–Њ–њ–∞–њ; mousedown –≤–љ–µ –њ–Њ–њ–∞–њ–∞ –Ј–∞–Ї—А—Л–≤–∞–µ—В –∞–≤—В–Њ–Љ–∞—В–Є—З–µ—Б–Ї–Є */
var CPOP_ST=null;
document.addEventListener('mousedown',function(e){var p=document.getElementById('cpop');if(p&&!p.contains(e.target)&&!e.target.classList.contains('cfg-swatch'))closeCpop();});
function openCpop(st,el){
  CPOP_ST=st;var hex=S.cfg.statColors[st]||'#888888';
  document.getElementById('cp-col').value=hex;
  document.getElementById('cp-hex').value=hex;
  var pop=document.getElementById('cpop'),rect=el.getBoundingClientRect();
  pop.style.left=Math.min(rect.left,window.innerWidth-200)+'px';pop.style.top=(rect.bottom+6)+'px';pop.style.display='block';
}
function closeCpop(){document.getElementById('cpop').style.display='none';CPOP_ST=null;}
function cpApply(hex){if(!CPOP_ST)return;S.cfg.statColors[CPOP_ST]=hex;var sw=document.getElementById('sw-'+CPOP_ST);if(sw)sw.style.background=hex;}
function cpColCh(el){document.getElementById('cp-hex').value=el.value;cpApply(el.value);}
function cpHexCh(el){var v=el.value.trim();if(!/^#[0-9a-fA-F]{6}$/.test(v))return;document.getElementById('cp-col').value=v;cpApply(v);}

/* вФАвФА DnD –Ї–Њ–љ—Д–Є–≥-—Б—В—А–Њ–Ї (—Б–ї–Њ—В—Л —Б–љ–∞—А—П–ґ–µ–љ–Є—П, —В–Є–њ—Л –њ—А–µ–і–Љ–µ—В–Њ–≤) вФАвФА */
var CFG_DND={sec:null,idx:null};
function cfgDs(e,tr){CFG_DND={sec:tr.dataset.sec,idx:+tr.dataset.ci};e.dataTransfer.effectAllowed='move';}
function cfgDo(e,tr){e.preventDefault();tr.classList.add('cfg-drag-over');}
function cfgDl(tr){tr.classList.remove('cfg-drag-over');}
function cfgDd(e,tr,sec){
  e.preventDefault();tr.classList.remove('cfg-drag-over');
  var from=CFG_DND.idx,to=+tr.dataset.ci;if(from===to)return;
  if(sec==='res'){var keys=Object.keys(S.cfg.resources),key=keys.splice(from,1)[0];keys.splice(to,0,key);var nO={};keys.forEach(function(k){nO[k]=S.cfg.resources[k];});S.cfg.resources=nO;}
  else if(sec==='stats'){var keys=Object.keys(S.cfg.statTypes),key=keys.splice(from,1)[0];keys.splice(to,0,key);var nt={},nc={},ns={};keys.forEach(function(k){nt[k]=S.cfg.statTypes[k];nc[k]=S.cfg.statColors[k];ns[k]=S.cfg.statSources[k];});S.cfg.statTypes=nt;S.cfg.statColors=nc;S.cfg.statSources=ns;}
  else if(sec==='slots'){S.cfg.equipSlots.splice(to,0,S.cfg.equipSlots.splice(from,1)[0]);}
  renderConfig();
}

function addItemType(sec){var t=prompt('–Э–∞–Ј–≤–∞–љ–Є–µ —В–Є–њ–∞:');if(!t)return;t=t.trim();if(!S.cfg.itemTypes)S.cfg.itemTypes={};if(!S.cfg.itemTypes[sec])S.cfg.itemTypes[sec]=getItemTypes(sec).slice();S.cfg.itemTypes[sec].push(t);renderConfig();}
function delItemType(sec,idx){if(!S.cfg.itemTypes)S.cfg.itemTypes={};if(!S.cfg.itemTypes[sec])S.cfg.itemTypes[sec]=getItemTypes(sec).slice();S.cfg.itemTypes[sec].splice(idx,1);renderConfig();}
function updItemType(sec,idx,val){val=val.trim();if(!val)return;if(!S.cfg.itemTypes)S.cfg.itemTypes={};if(!S.cfg.itemTypes[sec])S.cfg.itemTypes[sec]=getItemTypes(sec).slice();S.cfg.itemTypes[sec][idx]=val;}
function _ensureCircles(){if(!S.cfg.magicCircles)S.cfg.magicCircles=getMagicCircles().slice();}
function addMagicCircle(){var t=prompt('–Ъ—А—Г–≥ (–љ–∞–њ—А–Є–Љ–µ—А VI):');if(!t)return;_ensureCircles();S.cfg.magicCircles.push(t.trim());renderConfig();}
function delMagicCircle(idx){_ensureCircles();S.cfg.magicCircles.splice(idx,1);renderConfig();}
function updMagicCircle(idx,val){val=val.trim();if(!val)return;_ensureCircles();S.cfg.magicCircles[idx]=val;}
function _ensureDirs(){if(!S.cfg.magicDirections)S.cfg.magicDirections=JSON.parse(JSON.stringify(getMagicDirections()));}
function addMagicDir(){var n=prompt('–Э–∞–Ј–≤–∞–љ–Є–µ –љ–∞–њ—А–∞–≤–ї–µ–љ–Є—П:');if(!n)return;_ensureDirs();S.cfg.magicDirections.push({name:n.trim(),subs:[]});renderConfig();}
function delMagicDir(di){_ensureDirs();S.cfg.magicDirections.splice(di,1);renderConfig();}
function updMagicDir(di,val){val=val.trim();if(!val)return;_ensureDirs();S.cfg.magicDirections[di].name=val;}
function addMagicSub(di){var n=prompt('–Э–∞–Ј–≤–∞–љ–Є–µ –њ–Њ–і–љ–∞–њ—А–∞–≤–ї–µ–љ–Є—П:');if(!n)return;_ensureDirs();S.cfg.magicDirections[di].subs.push(n.trim());renderConfig();}
function delMagicSub(di,si){_ensureDirs();S.cfg.magicDirections[di].subs.splice(si,1);renderConfig();}
function updMagicSub(di,si,val){val=val.trim();if(!val)return;_ensureDirs();S.cfg.magicDirections[di].subs[si]=val;}
function updMagicDirCircles(di,val){_ensureDirs();S.cfg.magicDirections[di].circles=val?val.split(',').map(function(s){return s.trim();}).filter(Boolean):[];}
function addRes(){var k=prompt('–Ъ–ї—О—З:');if(!k)return;if(!S.cfg.resources)S.cfg.resources={};S.cfg.resources[k]='';renderConfig();}
function delRes(k){delete S.cfg.resources[k];renderConfig();}
function renameRes(o,n,el){if(!n||n===o)return;S.cfg.resources[n]=S.cfg.resources[o];delete S.cfg.resources[o];el.dataset.old=n;}
function renameStat(o,n,el){if(!n||n===o)return;var c=S.cfg;c.statTypes[n]=c.statTypes[o];delete c.statTypes[o];if(c.statColors[o]!==undefined){c.statColors[n]=c.statColors[o];delete c.statColors[o];}if(c.statSources[o]!==undefined){c.statSources[n]=c.statSources[o];delete c.statSources[o];}el.dataset.old=n;}
function updSrc(st,v){S.cfg.statSources[st]=pcsv(v);}
function pcsv(v){return v.split(',').map(function(s){return s.trim();}).filter(Boolean);}
function addStat(){var n=prompt('–°—В–∞—В:');if(!n)return;S.cfg.statTypes[n]='–≤–ї–∞–і–µ–љ–Є–µ';S.cfg.statColors[n]='#888888';if(!S.cfg.statSources)S.cfg.statSources={};S.cfg.statSources[n]=[];renderConfig();}
function delStat(st){delete S.cfg.statTypes[st];delete S.cfg.statColors[st];if(S.cfg.statSources)delete S.cfg.statSources[st];renderConfig();}
function addSlot(){S.cfg.equipSlots.push({key:'',label:''});renderConfig();}
function delSlot(idx){S.cfg.equipSlots.splice(idx,1);renderConfig();}

/* вФАвФА DnD —Б—В—А–Њ–Ї —В–∞–±–ї–Є—Ж—Л вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
   rDs/rDo/rDl/rDd вАФ dragstart/over/leave/drop –і–ї—П —Б—В—А–Њ–Ї items
   cSecDs/cSecDo/cSecDl/cSecDd вАФ DnD –і–ї—П –Ј–∞–≥–Њ–ї–Њ–≤–Ї–Њ–≤ –Ї–∞—В–µ–≥–Њ—А–Є–є */
function dhDown(span){var tr=span.closest('tr');if(tr)tr.draggable=true;}
document.addEventListener('mouseup',function(){document.querySelectorAll('tr[draggable="true"]').forEach(function(tr){tr.draggable=false;});});
function rdStart(e,tr){DND_ROW={sec:tr.dataset.sec,cat:tr.dataset.cat,idx:+tr.dataset.idx};tr.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function rdOver(e,tr){
  if(DND_ROW.sec&&tr.dataset.sec&&DND_ROW.sec!==tr.dataset.sec)return;
  e.preventDefault();tr.classList.add('drag-over-top');
}
function rdLeave(tr){tr.classList.remove('drag-over-top');}
function clearCrossCatFields(item,sec,toCat){
  if(sec!=='magic')return;
  var catLabel=(S.db.magic[toCat]&&(S.db.magic[toCat].label||toCat))||toCat;
  var matched=getMagicDirections().find(function(g){return g.name===catLabel||g.name===toCat;});
  if(!matched)return;
  var dir=item.direction||'';
  if(dir&&matched.subs.indexOf(dir)<0){item.direction='';item.circle='';}
}
function rdDrop(e,tr){
  e.preventDefault();tr.classList.remove('drag-over-top');
  var toCat=tr.dataset.cat,toIdx=+tr.dataset.idx,toSec=tr.dataset.sec;
  var sec=DND_ROW.sec,fromCat=DND_ROW.cat,fromIdx=DND_ROW.idx;
  if(!sec)return;
  if(sec==='glossary'){
    if(fromIdx===toIdx)return;
    var arr=S.db.glossary;arr.splice(toIdx,0,arr.splice(fromIdx,1)[0]);render();return;
  }
  if(toSec!==sec)return;
  if(fromCat===toCat){
    if(fromIdx===toIdx)return;
    S.db[sec][fromCat].items.splice(toIdx,0,S.db[sec][fromCat].items.splice(fromIdx,1)[0]);
  } else {
    var item=S.db[sec][fromCat].items.splice(fromIdx,1)[0];
    clearCrossCatFields(item,sec,toCat);
    S.db[sec][toCat].items.splice(toIdx,0,item);
  }
  render();
}

/* вФАвФА –°–Ї–∞—З–Є–≤–∞–љ–Є–µ –і–∞–љ–љ—Л—Е вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
   dlJSON(obj, name) вАФ —Б–µ—А–Є–∞–ї–Є–Ј—Г–µ—В –Њ–±—К–µ–Ї—В –Є —Б–Ї–∞—З–Є–≤–∞–µ—В –Ї–∞–Ї .json
   dlAll             вАФ —Б–Ї–∞—З–Є–≤–∞–µ—В db.json –Є config.json –Њ–і–љ–Њ–≤—А–µ–Љ–µ–љ–љ–Њ */
function fr(label,input){return'<div class="fr"><div class="fl">'+label+'</div><div class="fv">'+input+'</div></div>';}
function frImg(label,input){return fr(label,'<div style="display:flex;gap:4px;align-items:center;">'+input.replace('<input ','<input style="flex:1;min-width:0;" ')+'<button class="art-up-btn" onclick="editorPickArt(this)" title="–Ч–∞–≥—А—Г–Ј–Є—В—М —Б —Г—Б—В—А–Њ–є—Б—В–≤–∞">вЖС</button></div>');}

var _TR={'–∞':'a','–±':'b','–≤':'v','–≥':'g','–і':'d','–µ':'e','—С':'yo','–ґ':'zh','–Ј':'z','–Є':'i','–є':'j','–Ї':'k','–ї':'l','–Љ':'m','–љ':'n','–Њ':'o','–њ':'p','—А':'r','—Б':'s','—В':'t','—Г':'u','—Д':'f','—Е':'h','—Ж':'ts','—З':'ch','—И':'sh','—Й':'sch','—К':'','—Л':'y','—М':'','—Н':'e','—О':'yu','—П':'ya'};
function translit(s){return(s||'').toLowerCase().split('').map(function(c){return _TR[c]!==undefined?_TR[c]:c;}).join('').replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'').slice(0,48);}

var _editorUploadTarget=null;
var _editorUploadName='img';
function editorPickArt(btn){
    _editorUploadTarget=btn.previousElementSibling;
    _editorUploadName=translit(_editorUploadTarget.dataset.imgPrefix||'img');
    document.getElementById('editorFileInput').click();
}
document.addEventListener('DOMContentLoaded',function(){
    document.getElementById('editorFileInput').addEventListener('change',function(e){
        var file=e.target.files[0]; if(!file||!_editorUploadTarget) return;
        var target=_editorUploadTarget;
        var name=_editorUploadName;
        e.target.value='';
        var reader=new FileReader();
        reader.onload=function(ev){
            var src=ev.target.result;
            var wu=S.cfg.uploadUrl||S.cfg.workerUrl||'';
            if(wu){
                fetch(wu,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:src,name:name})})
                .then(function(r){return r.json();})
                .then(function(j){
                    if(j.success&&j.link){target.value=j.link;target.dispatchEvent(new Event('change'));}
                    else{toast('–Ю—И–Є–±–Ї–∞ –Ј–∞–≥—А—Г–Ј–Ї–Є');}
                })
                .catch(function(){toast('–Э–µ—В —Б–Њ–µ–і–Є–љ–µ–љ–Є—П');});
            } else {
                target.value=src;
                target.dispatchEvent(new Event('change'));
            }
        };
        reader.readAsDataURL(file);
    });
});
function dlDb(){dlJson(S.db,'db.json');toast('db.json —Б–Ї–∞—З–∞–љ');}
function dlCfg(){dlJson(S.cfg,'config.json');toast('config.json —Б–Ї–∞—З–∞–љ');}
function dlJson(data,fname){var b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download=fname;a.click();URL.revokeObjectURL(u);}
function openImgPopup(src){if(!src)return;document.getElementById('img-popup-img').src=src;document.getElementById('img-popup').style.display='flex';}
function closeImgPopup(){document.getElementById('img-popup').style.display='none';document.getElementById('img-popup-img').src='';}
</script>
<div id="img-popup" onclick="closeImgPopup()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:99999;align-items:center;justify-content:center;cursor:zoom-out;">
  <img id="img-popup-img" src="" alt="" onclick="event.stopPropagation()" style="max-width:92vw;max-height:92vh;border-radius:8px;object-fit:contain;cursor:default">
</div>
<input type="file" id="editorFileInput" accept="image/*" style="display:none;">
